<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Explorer · 开源项目发现</title>
  <meta name="description" content="发现 GitHub 上最精彩的开源世界。自动抓取 Trending 排行，AI 驱动的中文项目简介。" />

  <!-- 使用系统字体栈，无外部依赖 -->
  <style>
    /* ════════════════════════════════════════ */
    /*   Material Design 3 Expressive          */
    /*   Monet 动态色彩系统 (精简版)            */
    /* ════════════════════════════════════════ */

    :root {
      /* Primary — 紫色系 */
      --md-primary-80:     oklch(0.42 0.120 268);
      --md-primary-60:     oklch(0.54 0.170 275);
      --md-primary-40:     oklch(0.67 0.180 275);

      /* Secondary — 青紫色 */
      --md-secondary-80:   oklch(0.50 0.130 260);

      /* Tertiary — 橙黄暖色 */
      --md-tertiary-60:    oklch(0.62 0.175 55);

      /* Neutral */
      --md-surface-dim:        oklch(0.14 0.010 265);
      --md-surface:            oklch(0.17 0.012 265);
      --md-surface-bright:     oklch(0.22 0.015 265);
      --md-surface-container-lowest: oklch(0.10 0.008 265);
      --md-surface-container-low:   oklch(0.19 0.013 265);
      --md-surface-container:      oklch(0.21 0.015 265);
      --md-surface-container-high: oklch(0.29 0.020 265);

      --md-on-surface:      oklch(0.94 0.007 265);
      --md-on-surface-var:  oklch(0.72 0.020 265);
      --md-outline:         oklch(0.45 0.018 265);
      --md-outline-var:     oklch(0.58 0.110 270);

      --md-primary-container:    oklch(0.32 0.140 268);
      --md-on-pri-container:     oklch(0.92 0.065 270);
      --md-secondary-container:  oklch(0.38 0.105 255);
      --md-on-sec-container:     oklch(0.85 0.080 257);
      --md-tertiary-container:   oklch(0.33 0.125 45);
      --md-on-tert-container:    oklch(0.93 0.090 47);

      --md-error:           oklch(0.63 0.220 25);
      --md-error-container: oklch(0.30 0.150 25);

      /* ── Semantic Tokens ── */
      --color-primary:              var(--md-primary-80);
      --color-on-primary:           oklch(1.00 0 0);
      --color-primary-container:    var(--md-primary-container);
      --color-on-pri-container:     var(--md-on-pri-container);
      --color-secondary:            var(--md-secondary-80);
      --color-sec-container:        var(--md-secondary-container);
      --color-on-sec-container:     var(--md-on-sec-container);
      --color-tertiary:             var(--md-tertiary-60);
      --color-tertiary-container:   var(--md-tertiary-container);
      --color-on-tert-container:    var(--md-on-tert-container);
      --color-surface:              var(--md-surface);
      --color-surface-dim:          var(--md-surface-dim);
      --color-surface-bright:       var(--md-surface-bright);
      --color-surface-container-lowest: var(--md-surface-container-lowest);
      --color-surface-container-low:   var(--md-surface-container-low);
      --color-surface-container:       var(--md-surface-container);
      --color-surface-container-high:  var(--md-surface-container-high);
      --color-on-surface:           var(--md-on-surface);
      --color-on-surface-var:       var(--md-on-surface-var);
      --color-outline:              var(--md-outline);
      --color-outline-var:          var(--md-outline-var);
      --color-error:                var(--md-error);
      --color-error-container:      var(--md-error-container);

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Radii */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 999px;

      /* Shadows */
      --elevation-1: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
      --elevation-2: 0 4px 12px rgba(0,0,0,0.5);
      --elevation-3: 0 8px 24px rgba(0,0,0,0.6);

      /* Transitions */
      --ease-out: cubic-bezier(0.2,0,0,1);
      --dur-short: 150ms;
      --dur-medium: 300ms;
      --dur-long: 500ms;
    }

    /* Light theme */
    [data-theme="light"] {
      --md-surface-dim:        oklch(0.96 0.005 265);
      --md-surface:            oklch(0.94 0.007 265);
      --md-surface-bright:     oklch(0.90 0.009 265);
      --md-surface-container-lowest: oklch(1.00 0 0);
      --md-surface-container-low:   oklch(0.95 0.010 265);
      --md-surface-container:      oklch(0.90 0.012 265);
      --md-surface-container-high: oklch(0.82 0.015 265);
      --md-on-surface:      oklch(0.10 0.010 265);
      --md-on-surface-var:  oklch(0.30 0.020 265);
      --md-outline:         oklch(0.60 0.018 265);

      --md-primary-80:      oklch(0.44 0.140 268);
      --md-primary-container: oklch(0.90 0.080 270);
      --md-on-pri-container:  oklch(0.20 0.080 270);
      --md-secondary-container: oklch(0.88 0.070 255);
      --md-on-sec-container:   oklch(0.22 0.070 255);
      --md-tertiary-container: oklch(0.90 0.100 47);

      --color-primary:            var(--md-primary-80);
      --color-primary-container:  var(--md-primary-container);
      --color-on-pri-container:   var(--md-on-pri-container);
      --color-sec-container:      var(--md-secondary-container);
      --color-on-sec-container:   var(--md-on-sec-container);
      --color-tertiary-container: var(--md-tertiary-container);
      --color-surface:            var(--md-surface);
      --color-surface-dim:        var(--md-surface-dim);
      --color-surface-bright:     var(--md-surface-bright);
      --color-surface-container-lowest: var(--md-surface-container-lowest);
      --color-surface-container-low:   var(--md-surface-container-low);
      --color-surface-container:       var(--md-surface-container);
      --color-surface-container-high:  var(--md-surface-container-high);
      --color-on-surface:         var(--md-on-surface);
      --color-on-surface-var:     var(--md-on-surface-var);
      --color-outline:            var(--md-outline);
    }

    /* ════════════════════════════════════════ */
    /*   Reset & Base                          */
    /* ════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%}
    body{
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
      background:var(--color-surface-dim);
      color:var(--color-on-surface);
      line-height:1.6;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    code,pre,.mono{
      font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas',monospace;
    }

    /* ════════════════════════════════════════ */
    /*   Header                                */
    /* ════════════════════════════════════════ */
    .header{
      position:sticky;top:0;z-index:100;
      background:var(--color-surface-container);
      border-bottom:1px solid var(--color-outline);
      backdrop-filter:blur(20px);
    }
    .header-inner{
      max-width:1440px;margin:0 auto;padding:12px 20px;
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    }
    .logo{
      display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.25rem;
      color:var(--color-on-surface);text-decoration:none;white-space:nowrap;
    }
    .logo-dot{width:28px;height:28px;border-radius:var(--radius-sm);
      background:linear-gradient(135deg,var(--color-primary),var(--color-tertiary));
      display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;
    }
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);
      width:18px;height:18px;color:var(--color-on-surface-var);pointer-events:none}
    .search-input{
      width:100%;padding:10px 12px 10px 40px;
      border:1px solid var(--color-outline);border-radius:var(--radius-full);
      background:var(--color-surface-container-high);color:var(--color-on-surface);
      font-size:0.9rem;outline:none;transition:border var(--dur-short) var(--ease-out);
    }
    .search-input:focus{border-color:var(--color-primary)}
    .header-actions{display:flex;gap:8px;align-items:center}
    .header-badge{
      font-size:0.75rem;color:var(--color-on-surface-var);white-space:nowrap;
      padding:4px 10px;border-radius:var(--radius-full);
      background:var(--color-surface-container-high);
    }
    .icon-btn{
      width:36px;height:36px;border:none;border-radius:var(--radius-full);
      background:var(--color-surface-container-high);color:var(--color-on-surface-var);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background var(--dur-short) var(--ease-out);
    }
    .icon-btn:hover{background:var(--color-secondary-container);color:var(--color-on-sec-container)}
    .icon-btn svg{width:18px;height:18px}

    /* ════════════════════════════════════════ */
    /*   Navigation                            */
    /* ════════════════════════════════════════ */
    .nav-bar{
      max-width:1440px;margin:0 auto;padding:8px 20px;
      display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .nav-bar::-webkit-scrollbar{display:none}
    .nav-chip{
      flex-shrink:0;padding:8px 16px;border-radius:var(--radius-full);
      border:1px solid var(--color-outline);background:var(--color-surface-container);
      color:var(--color-on-surface-var);font-size:0.85rem;cursor:pointer;
      transition:all var(--dur-short) var(--ease-out);
      white-space:nowrap;display:flex;align-items:center;gap:6px;
    }
    .nav-chip:hover{background:var(--color-surface-container-high)}
    .nav-chip.active{
      background:var(--color-primary-container);color:var(--color-on-pri-container);
      border-color:transparent;font-weight:600;
    }
    .nav-chip .badge{
      font-size:0.7rem;padding:2px 6px;border-radius:var(--radius-full);
      background:var(--color-tertiary-container);color:var(--color-on-tert-container);
    }

    /* ════════════════════════════════════════ */
    /*   Main Content                          */
    /* ════════════════════════════════════════ */
    .main{max-width:1440px;margin:0 auto;padding:20px}

    .stats-row{
      display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;
    }
    .stat-card{
      flex:1;min-width:140px;padding:16px;border-radius:var(--radius-md);
      background:var(--color-surface-container);border:1px solid var(--color-outline);
    }
    .stat-value{font-size:1.5rem;font-weight:700;color:var(--color-primary)}
    .stat-label{font-size:0.8rem;color:var(--color-on-surface-var);margin-top:2px}

    .section-header{margin-bottom:16px}
    .section-title{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .section-sub{font-size:0.85rem;color:var(--color-on-surface-var);margin-top:4px}

    /* ── Responsive Grid ── */
    .repo-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
      gap:16px;
    }

    /* ── Card ── */
    .repo-card{
      background:var(--color-surface-container);
      border:1px solid var(--color-outline);
      border-radius:var(--radius-lg);
      padding:20px;cursor:pointer;
      transition:all var(--dur-medium) var(--ease-out);
      display:flex;flex-direction:column;gap:12px;
      content-visibility:auto;contain-intrinsic-size:auto 220px;
    }
    .repo-card:hover{
      border-color:var(--color-outline-var);
      transform:translateY(-2px);
      box-shadow:var(--elevation-2);
      background:var(--color-surface-container-high);
    }
    .card-top{display:flex;align-items:flex-start;gap:12px}
    .card-avatar{
      width:44px;height:44px;border-radius:var(--radius-sm);
      background:var(--color-surface-container-high);flex-shrink:0;
      object-fit:cover;
    }
    .card-info{flex:1;min-width:0}
    .card-owner{font-size:0.75rem;color:var(--color-on-surface-var);margin-bottom:2px}
    .card-name{font-size:1rem;font-weight:700;color:var(--color-primary);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-desc{font-size:0.85rem;color:var(--color-on-surface-var);
      line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .card-desc.ai{color:var(--color-tertiary)}
    .card-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:0.8rem;margin-top:auto}
    .card-meta-item{display:flex;align-items:center;gap:4px;color:var(--color-on-surface-var)}
    .card-meta-item.lang{font-weight:600}
    .lang-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .star-bar{flex:1;height:4px;border-radius:2px;background:var(--color-surface-container-high);overflow:hidden}
    .star-bar-fill{height:100%;border-radius:2px;
      background:linear-gradient(90deg,var(--color-primary),var(--color-secondary));
      transition:width var(--dur-long) var(--ease-out)}
    .tag{font-size:0.7rem;padding:3px 8px;border-radius:var(--radius-full);
      background:var(--color-secondary-container);color:var(--color-on-sec-container)}
    .today-badge{
      font-size:0.75rem;font-weight:700;color:var(--color-tertiary);
      background:var(--color-tertiary-container);padding:2px 8px;border-radius:var(--radius-full)}

    /* ── Skeleton ── */
    .skeleton-card{
      background:var(--color-surface-container);border:1px solid var(--color-outline);
      border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;gap:12px;
    }
    .skeleton-shape{
      background:linear-gradient(90deg,var(--color-surface-container-high) 25%,var(--color-surface-bright) 50%,var(--color-surface-container-high) 75%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);
    }
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .sk-avatar{width:44px;height:44px;border-radius:var(--radius-sm)}
    .sk-title{height:20px;width:60%}
    .sk-sub{height:16px;width:40%}
    .sk-desc{height:14px;width:90%}
    .sk-bar{height:4px;width:100%}
    .sk-meta{height:14px;width:30%}

    /* ── States ── */
    .error-state,.empty-state{
      grid-column:1/-1;text-align:center;padding:48px 20px;
      color:var(--color-on-surface-var);
    }
    .error-state svg,.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:0.5}
    .error-state h3,.empty-state h3{font-size:1.1rem;margin-bottom:8px}
    .btn-filled{
      display:inline-flex;align-items:center;gap:8px;padding:10px 24px;
      margin-top:16px;border:none;border-radius:var(--radius-full);
      background:var(--color-primary-container);color:var(--color-on-pri-container);
      font-size:0.9rem;font-weight:600;cursor:pointer;
      transition:opacity var(--dur-short) var(--ease-out);
    }
    .btn-filled:hover{opacity:0.85}
    .btn-filled svg{width:16px;height:16px}

    /* ── Footer ── */
    .footer{
      text-align:center;padding:24px 20px 32px;
      color:var(--color-on-surface-var);font-size:0.8rem;
    }
    .footer a{color:var(--color-primary);text-decoration:none}

    /* ── Toast ── */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      padding:10px 20px;border-radius:var(--radius-full);
      background:var(--color-surface-container-high);color:var(--color-on-surface);
      font-size:0.85rem;box-shadow:var(--elevation-3);z-index:999;
      opacity:0;transition:opacity var(--dur-short) var(--ease-out);
    }
    .toast.show{opacity:1}

    /* ── Spin ── */
    .spin{animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Tab panels ── */
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    @media(max-width:768px){
      .repo-grid{grid-template-columns:1fr}
      .header-inner{padding:10px 12px}
      .nav-bar{padding:6px 12px}
      .main{padding:12px}
      .stats-row{gap:8px}
      .stat-card{padding:12px}
      .stat-value{font-size:1.2rem}
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════ -->
  <!--   Header                                 -->
  <!-- ════════════════════════════════════════ -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/github-explorer/"><span class="logo-dot">GH</span>GitHubExplorer</a>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="qSearch" type="search" placeholder="搜索项目名称、描述…" autocomplete="off" />
      </div>
      <div class="header-actions">
        <span class="header-badge" id="updateTime">加载中…</span>
        <button class="icon-btn" id="themeBtn" title="切换主题" aria-label="切换主题">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="icon-btn" id="refreshBtn" title="刷新数据" aria-label="刷新">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
      </div>
    </div>
    <nav class="nav-bar" id="navBar">
      <!-- JS 动态生成 -->
    </nav>
  </header>

  <!-- ════════════════════════════════════════ -->
  <!--   Main Content                          -->
  <!-- ════════════════════════════════════════ -->
  <main class="main">
    <!-- Stats Row -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-value" id="statCount">—</div><div class="stat-label">当前板块</div></div>
      <div class="stat-card"><div class="stat-value" id="statMaxStar">—</div><div class="stat-label">最高 Star</div></div>
      <div class="stat-card"><div class="stat-value" id="statLangs">—</div><div class="stat-label">编程语言数</div></div>
      <div class="stat-card"><div class="stat-value" id="statUpdate">—</div><div class="stat-label">最后更新</div></div>
    </div>

    <!-- Dynamic Tab Panels -->
    <div id="tabPanels">
      <!-- JS 动态生成 -->
    </div>
  </main>

  <footer class="footer">
    <p>数据来源：<a href="https://github.com/trending" target="_blank" rel="noopener">github.com/trending</a> · GitHub Actions 定时抓取 · AI 中文简介由 GitHub Actions 预生成</p>
    <p>GitHub Explorer v3 · 仅作开源项目发现用途</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
  /* ═══════════════════════════════════════════════════════════════
     GitHub Explorer v3 — 离线优先架构

     数据流:
       1. 优先: fetch('data/{category}.json') — 同源静态 JSON
       2. 回退: CORS 代理抓取 GitHub Trending HTML
       3. AI 翻译: 由 GitHub Actions 预生成（zhDesc 字段）
         不再在浏览器端暴露 API Key

     性能:
       - 零外部字体/图标依赖
       - content-visibility:auto 惰性渲染
       - localStorage 缓存（1 小时）
   ══════════════════════════════════════════════════════════════ */

  // ── 配置 ──
  // ✅ 不再在代码中存储 API Key
  // AI 翻译由 GitHub Actions 预生成到 data/*.json
  const DATA_BASE = location.pathname.replace(/\/[^/]*$/, '') + '/data/';
  
  // 缓存策略：JSON 数据缓存 1 小时，远超之前的 10 分钟
  const CACHE_TTL = 60 * 60 * 1000;
  const CACHE_PREFIX = 'gh_explorer_';

  // 回退 CORS 代理（当 JSON 不可用时）
  const CORS_PROXIES = [
    url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    url => 'https://corsproxy.io/?' + encodeURIComponent(url),
    url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
  ];

  // 分类定义（与 scrape.js 保持一致）
  const CATEGORIES = {
    trending: { url:'https://github.com/trending?since=daily',         label:'热门趋势', icon:'🔥', priority:1 },
    newest:   { url:'https://github.com/trending?since=weekly',        label:'本周新星', icon:'🆕', priority:2 },
    ai:       { url:'https://github.com/trending/artificial-intelligence?since=daily', label:'AI & LLM', icon:'🤖', priority:1 },
    design:   { url:'https://github.com/trending?since=weekly',        label:'设计系统', icon:'🎨', priority:3 },
    tools:    { url:'https://github.com/trending?since=daily',         label:'开发工具', icon:'🛠', priority:3 },
    mobile:   { url:'https://github.com/trending/mobile-development?since=daily', label:'移动开发', icon:'📱', priority:3 },
    security: { url:'https://github.com/trending/cyber-security?since=weekly', label:'安全研究', icon:'🔐', priority:3 },
  };

  const LANG_COLORS = {
    JavaScript:'#f1e05a',TypeScript:'#3178c6',Python:'#3572A5',Java:'#b07219',
    C:'#555555','C++':'#f34b7d','C#':'#178600',Go:'#00ADD8',Rust:'#dea584',
    Swift:'#F05138',Kotlin:'#A97BFF',Ruby:'#701516',PHP:'#4F5D95',
    Shell:'#89e051',HTML:'#e34c26',CSS:'#563d7c',Vue:'#41b883',
    Dart:'#00B4AB',Jupyter:'#DA5B0B',Dockerfile:'#384d54',
  };

  // ── 工具函数 ──
  const fmtNum = n => {
    if (!n && n!==0) return '—';
    if (n>=1e6) return (n/1e6).toFixed(1)+'M';
    if (n>=1e3) return (n/1e3).toFixed(1)+'k';
    return ''+n;
  };
  const langColor = l => LANG_COLORS[l]||'#6b7280';
  const relTime = iso => {
    const diff=Date.now()-new Date(iso).getTime();
    const m=Math.floor(diff/6e4),h=Math.floor(diff/36e5),d=Math.floor(diff/864e5);
    if(m<1)return '刚刚';if(m<60)return m+'分钟前';
    if(h<24)return h+'小时前';if(d<30)return d+'天前';
    return Math.floor(d/30)+'个月前';
  };

  // ── localStorage 缓存 ──
  function cacheGet(key) {
    try {
      const raw=localStorage.getItem(CACHE_PREFIX+key);
      if(!raw)return null;
      const o=JSON.parse(raw);
      if(Date.now()>o.exp){localStorage.removeItem(CACHE_PREFIX+key);return null;}
      return o.data;
    }catch{return null;}
  }
  function cacheSet(key,data,ttl) {
    try{localStorage.setItem(CACHE_PREFIX+key,JSON.stringify({data,exp:Date.now()+ttl}));}catch{}
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg,ms=2500) {
    const el=document.getElementById('toast');
    el.textContent=msg;el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('show'),ms);
  }

  // ── 状态 ──
  let allRepos = {};        // { categoryKey: [repo, ...] }
  let loadedTabs = new Set();
  let currentTab = 'trending';
  let currentSearch = '';
  let dataSource = {};      // { categoryKey: 'json' | 'proxy' | 'cache' }

  // ── 渲染骨架屏 ──
  function renderSkeletons(gridId) {
    document.getElementById(gridId).innerHTML = Array(8).fill(`
      <div class="skeleton-card">
        <div style="display:flex;gap:12px"><div class="skeleton-shape sk-avatar"></div><div style="flex:1"><div class="skeleton-shape sk-title"></div><div class="skeleton-shape sk-sub" style="margin-top:8px"></div></div></div>
        <div class="skeleton-shape sk-desc"></div><div class="skeleton-shape sk-desc" style="width:75%"></div>
        <div class="skeleton-shape sk-bar"></div>
        <div style="display:flex;gap:12px"><div class="skeleton-shape sk-meta"></div><div class="skeleton-shape sk-meta"></div></div>
      </div>`).join('');
  }

  // ── 渲染卡片 ──
  function renderCard(repo, idx, maxStars) {
    const pct = Math.min(100, Math.round(((repo.stars||0)/Math.max(maxStars,1))*100));
    const desc = repo.zhDesc || repo.description || '暂无描述';
    const isAi = !!repo.zhDesc;
    const lang = repo.language;
    const lc = langColor(lang);
    const today = repo.todayStars ? `<span class="today-badge">今日 +${fmtNum(repo.todayStars)} ⭐</span>` : '';

    const topicsHtml = (repo.topics||[]).slice(0,4).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('');

    return `
    <div class="repo-card" onclick="window.open('${escHtml(repo.url)}','_blank')" title="${escHtml(repo.fullName)}" role="button" tabindex="${idx}">
      <div class="card-top">
        <img class="card-avatar" src="${escHtml(repo.avatarUrl)}" alt="" loading="lazy" width="44" height="44" />
        <div class="card-info">
          <div class="card-owner">${escHtml(repo.owner)}</div>
          <div class="card-name">${escHtml(repo.name)}</div>
        </div>
        ${today}
      </div>
      <div class="card-desc${isAi?' ai':''}">${escHtml(desc)}</div>
      ${topicsHtml?`<div style="display:flex;gap:4px;flex-wrap:wrap">${topicsHtml}</div>`:''}
      <div class="star-bar"><div class="star-bar-fill" style="width:${pct}%"></div></div>
      <div class="card-meta">
        ${lang?`<span class="card-meta-item lang"><span class="lang-dot" style="background:${lc}"></span>${escHtml(lang)}</span>`:''}
        <span class="card-meta-item">⭐${fmtNum(repo.stars)}</span>
        <span class="card-meta-item">⑂${fmtNum(repo.forks)}</span>
      </div>
    </div>`;
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 渲染列表 ──
  function filterRender(tab) {
    const repos = allRepos[tab] || [];
    const term = currentSearch.trim().toLowerCase();
    const filtered = term
      ? repos.filter(r => `${r.fullName} ${r.description||''} ${r.owner} ${(r.topics||[]).join(' ')}`.toLowerCase().includes(term))
      : repos;

    const grid = document.getElementById('grid-'+tab);
    if (!grid) return;

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <h3>${term?'无匹配结果':'暂无数据'}</h3><p>${term?'换个关键词试试？':'请检查网络连接后刷新'}</p>
      </div>`;
      updateStats([]);
      return;
    }

    const maxS = Math.max(...filtered.map(r=>r.stars||0), 1);
    grid.innerHTML = filtered.map((r,i)=>renderCard(r,i,maxS)).join('');
    updateStats(filtered);
  }

  function renderError(gridId, msg) {
    const el = document.getElementById(gridId);
    if (!el) return;
    el.innerHTML = `<div class="error-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="8"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
      <h3>加载失败</h3><p>${escHtml(msg)}</p>
      <button class="btn-filled" onclick="loadTab('${gridId.replace('grid-','')}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>重试
      </button></div>`;
  }

  function updateDataSourceLabel(tab) {
    const sub = document.querySelector('#panel-' + tab + ' .section-sub');
    if (sub) sub.textContent = 'GitHub Trending · ' + (dataSource[tab]==='json' ? '预计算数据' : dataSource[tab]==='proxy' ? '实时抓取' : '缓存数据');
  }

  function updateStats(repos) {
    document.getElementById('statCount').textContent = repos.length;
    const maxS = repos.length ? Math.max(...repos.map(r=>r.stars||0)) : 0;
    document.getElementById('statMaxStar').textContent = fmtNum(maxS);
    const langs = new Set(repos.map(r=>r.language).filter(Boolean));
    document.getElementById('statLangs').textContent = langs.size;
  }

  // ══════════════════════════════════════════
  //  数据加载: 优先 JSON，回退 CORS 代理
  // ══════════════════════════════════════════

  /** 主加载函数：尝试 JSON → 缓存 → CORS 代理 */
  async function loadCategory(tab) {
    // 1. 尝试从预计算 JSON 加载
    try {
      const jsonUrl = DATA_BASE + tab + '.json';
      const resp = await fetch(jsonUrl, { cache: 'no-cache' });
      if (resp.ok) {
        const payload = await resp.json();
        if (payload.repos && payload.repos.length > 0) {
          dataSource[tab] = 'json';
          updateDataSourceLabel(tab);
          // 更新统计栏时间
          if (payload.updated) {
            document.getElementById('statUpdate').textContent = relTime(payload.updated);
            document.getElementById('updateTime').textContent = relTime(payload.updated) + ' 更新';
          }
          return payload.repos;
        }
      }
    } catch(e) {
      console.log(`[Load] JSON 不可用 (${tab}): ${e.message}`);
    }

    // 2. 尝试 localStorage 缓存
    const cached = cacheGet('cat_'+tab);
    if (cached) {
      dataSource[tab] = 'cache';
      updateDataSourceLabel(tab);
      showToast('使用缓存数据（' + relTime(new Date(Date.now()-CACHE_TTL).toISOString()) + '前）');
      return cached;
    }

    // 3. 回退到 CORS 代理抓取
    console.log(`[Load] 回退到 CORS 代理抓取 (${tab})...`);
    showToast('正在实时抓取 GitHub Trending...', 3000);

    try {
      const repos = await scrapeViaProxy(tab);
      if (repos.length > 0) {
        cacheSet('cat_'+tab, repos, CACHE_TTL);
        dataSource[tab] = 'proxy';
        updateDataSourceLabel(tab);
        document.getElementById('updateTime').textContent = '实时抓取';
        document.getElementById('statUpdate').textContent = '实时';
        return repos;
      }
    } catch(e) {
      console.error(`[Load] CORS 代理失败 (${tab}):`, e.message);
      throw e;
    }

    throw new Error('所有数据源均不可用');
  }

  /** CORS 代理抓取 + 客户端解析 (回退方案) */
  async function scrapeViaProxy(tab) {
    const targetUrl = CATEGORIES[tab]?.url;
    if (!targetUrl) throw new Error('未知分类');

    // 尝试所有代理
    let html = '';
    for (let i = 0; i < CORS_PROXIES.length; i++) {
      try {
        const proxyUrl = CORS_PROXIES[i](targetUrl);
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
        if (res.ok) { html = await res.text(); break; }
      } catch(e) {
        console.warn(`[Proxy ${i+1}] ${e.message}`);
      }
    }
    if (!html) throw new Error('所有 CORS 代理不可用');

    // 浏览器端解析 HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const repos = [];
    
    doc.querySelectorAll('.Box-row').forEach(row => {
      const linkEl = row.querySelector('h2 a[href^="/"]');
      if (!linkEl) return;
      let href = (linkEl.getAttribute('href')||'').trim().replace(/^\//,'').replace(/\/$/,'');
      if (!href || !href.includes('/')) return;
      
      const parts = href.split('/').map(s=>s.trim());
      if (parts.length<2) return;
      const owner=parts[0], name=parts[1];
      
      const pEl = row.querySelector('p');
      const desc = pEl ? pEl.textContent.trim() : '';
      
      let stars=0, forks=0;
      const starLink = row.querySelector('a[href*="/stargazers"]');
      if (starLink) stars = parseNum(starLink.textContent);
      const forkLink = row.querySelector('a[href*="/forks"]');
      if (forkLink) forks = parseNum(forkLink.textContent);
      
      let todayStars=0;
      const dailyEls = row.querySelectorAll('span.d-inline-block.float-sm-right');
      if (dailyEls.length) {
        todayStars = parseInt((dailyEls[dailyEls.length-1]?.textContent||'').replace(/[^0-9]/g,''))||0;
      }
      
      const langProp = row.querySelector('[itemprop="programmingLanguage"]');
      const language = langProp ? langProp.textContent.trim() : '';
      
      const topics = [];
      row.querySelectorAll('a.topic-tag-link,.topic-tag').forEach(t=>{
        const tn=t.textContent.trim();if(tn)topics.push(tn);
      });
      
      repos.push({
        fullName:`${owner}/${name}`,owner,name,
        description:desc,
        url:`https://github.com/${owner}/${name}`,
        avatarUrl:`https://github.com/${owner}.png`,
        stars,forks,todayStars,language,topics,
      });
    });
    
    return repos;
  }

  function parseNum(text) {
    const s = String(text||'').replace(/<[^>]+>/g,'').replace(/[,+\s]/g,'').trim();
    if (/(\d+\.?\d*)([kK])/.test(s)) return Math.round(parseFloat(RegExp.$1)*1000);
    if (/(\d+\.?\d*)([mM])/.test(s)) return Math.round(parseFloat(RegExp.$1)*1000000);
    return parseInt(s,10)||0;
  }

  // ══════════════════════════════════════════
  //  加载 Tab
  // ══════════════════════════════════════════

  async function loadTab(tab) {
    if (loadedTabs.has(tab) && allRepos[tab] && allRepos[tab].length > 0 && !currentSearch) {
      filterRender(tab);
      updateBadgeCount(tab, allRepos[tab].length);
      return;
    }

    renderSkeletons('grid-'+tab);

    try {
      const repos = await loadCategory(tab);
      allRepos[tab] = repos;
      loadedTabs.add(tab);
      updateBadgeCount(tab, repos.length);
      filterRender(tab);
    } catch(e) {
      console.error('[Load]', tab, e);
      renderError('grid-'+tab, e.message);
    }
  }

  function updateBadgeCount(tab, count) {
    const badge = document.getElementById('cnt-'+tab);
    if (badge) badge.textContent = count;
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.nav-chip').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    const panel = document.getElementById('panel-'+tab);
    if (panel) panel.classList.add('active');
    currentTab = tab;
    loadTab(tab);
  }

  // ══════════════════════════════════════════
  //  刷新 & 主题
  // ══════════════════════════════════════════

  async function refreshData() {
    loadedTabs.clear();
    allRepos = {};
    dataSource = {};

    // 清除缓存
    Object.keys(localStorage)
      .filter(k=>k.startsWith(CACHE_PREFIX+'cat_'))
      .forEach(k=>localStorage.removeItem(k));

    const btn = document.querySelector('#refreshBtn svg');
    btn?.classList.add('spin');
    await loadTab(currentTab);
    btn?.classList.remove('spin');
    showToast('数据已刷新');
  }

  let isDark = true;
  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
    document.getElementById('themeIcon').innerHTML = isDark
      ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
      : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }

  // ══════════════════════════════════════════
  //  初始化
  // ══════════════════════════════════════════

  function init() {
    // 生成导航
    const navBar = document.getElementById('navBar');
    const tabPanels = document.getElementById('tabPanels');
    
    let navHtml = '';
    let panelsHtml = '';
    
    Object.entries(CATEGORIES).forEach(([key, cfg]) => {
      navHtml += `<button class="nav-chip${key==='trending'?' active':''}" onclick="switchTab('${key}',this)" data-tab="${key}">
        ${cfg.icon} ${cfg.label} <span class="badge" id="cnt-${key}">—</span>
      </button>`;
      panelsHtml += `<div class="tab-panel${key==='trending'?' active':''}" id="panel-${key}">
        <div class="section-header"><h3 class="section-title">${cfg.icon} ${cfg.label}</h3>
        <p class="section-sub">GitHub Trending · ${dataSource[key]==='json'?'预计算数据':'实时抓取'}</p></div>
        <div class="repo-grid" id="grid-${key}"></div>
      </div>`;
    });
    
    navBar.innerHTML = navHtml;
    tabPanels.innerHTML = panelsHtml;

    // 事件绑定
    document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    document.getElementById('refreshBtn').addEventListener('click', refreshData);

    let searchTimer;
    document.getElementById('qSearch').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(()=>{currentSearch=e.target.value;filterRender(currentTab);},300);
    });

    // 启动
    loadTab('trending');
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
